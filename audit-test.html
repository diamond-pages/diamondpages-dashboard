<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Audit Test</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f8fafc; }
  button { background: #0d9488; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 16px; cursor: pointer; }
  #result { margin-top: 20px; padding: 16px; background: white; border-radius: 12px; border: 1px solid #e2e8f0; display: none; }
  #log { margin-top: 20px; font-size: 12px; color: #666; white-space: pre-wrap; background: #1a1a2e; color: #a8ff78; padding: 12px; border-radius: 8px; }
</style>
</head>
<body>

<h2>💎 Audit API Test</h2>
<p>Calls the real API and renders the score</p>

<button onclick="runTest()">Run Test Audit</button>
<button onclick="runTest2()" style="margin-left:10px;background:#6366f1;">Test with Lux Neon</button>

<div id="result">
  <h3>Score: <span id="score">—</span>/100</h3>
  <p>Rank: <span id="rank">—</span></p>
  <p>Rating: <span id="rating">—</span></p>
  <p>partial: <span id="partial">—</span></p>
  <p>email1Sent: <span id="email1">—</span></p>
</div>

<div id="log">Log will appear here...</div>

<script>
function log(msg) {
  const el = document.getElementById('log');
  el.textContent += new Date().toISOString().slice(11,19) + ' ' + msg + '\n';
}

async function runTest() {
  log('Starting test audit...');
  document.getElementById('result').style.display = 'none';
  
  try {
    log('Fetching from api.diamondpages.ai...');
    const res = await fetch('https://api.diamondpages.ai/api/audit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        businessName: 'Paradise Plumbing',
        vertical: 'plumber',
        city: 'Fort Lauderdale',
        email: 'test@test.com',
        ownerName: 'Test'
      })
    });
    
    log('Response status: ' + res.status);
    const data = await res.json();
    log('Data received: ' + JSON.stringify(data).slice(0, 200));
    
    document.getElementById('score').textContent = data.score ?? 'null';
    document.getElementById('rank').textContent = data.rank ?? 'null';
    document.getElementById('rating').textContent = data.rating ?? 'null';
    document.getElementById('partial').textContent = data.partial ?? 'false';
    document.getElementById('email1').textContent = data.email1Sent ?? 'unknown';
    document.getElementById('result').style.display = 'block';
    log('Done!');
  } catch(err) {
    log('ERROR: ' + err.message);
  }
}

async function runTest2() {
  log('Testing Lux Neon...');
  document.getElementById('result').style.display = 'none';
  
  try {
    const res = await fetch('https://api.diamondpages.ai/api/audit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        businessName: 'Lux Neon Art Gallery',
        vertical: 'neon signs',
        city: 'Dania Beach',
        website: 'luxneonartgallery.com',
        email: 'goodneonsigns@gmail.com',
        ownerName: 'Nicolas'
      })
    });
    
    log('Status: ' + res.status);
    const data = await res.json();
    log('score=' + data.score + ' rank=' + data.rank + ' partial=' + data.partial);
    
    document.getElementById('score').textContent = data.score ?? 'null';
    document.getElementById('rank').textContent = data.rank ?? 'null';
    document.getElementById('rating').textContent = data.rating ?? 'null';
    document.getElementById('partial').textContent = data.partial ?? 'false';
    document.getElementById('email1').textContent = data.email1Sent ?? 'unknown';
    document.getElementById('result').style.display = 'block';
    log('Complete!');
  } catch(err) {
    log('ERROR: ' + err.message);
  }
}
</script>
</body>
</html>
