<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #0f172a 0%, #0d2137 50%, #0a1628 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(13,148,136,0.2) 0%, transparent 70%);
    top: -100px; right: -100px;
    border-radius: 50%;
  }
  .glow2 {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(20,184,166,0.1) 0%, transparent 70%);
    bottom: -80px; left: -80px;
    border-radius: 50%;
  }
  .content {
    text-align: center;
    z-index: 1;
    padding: 40px;
  }
  .emoji { font-size: 80px; margin-bottom: 16px; display: block; }
  .headline {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: -0.04em;
    line-height: 1.0;
    margin-bottom: 16px;
  }
  .headline .teal { color: #14b8a6; }
  .headline .white { color: #f0f4f8; }
  .sub {
    font-size: 28px;
    color: #94a3b8;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 28px;
  }
  .badges {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .badge {
    background: rgba(13,148,136,0.15);
    border: 1px solid rgba(20,184,166,0.3);
    border-radius: 999px;
    padding: 8px 24px;
    font-size: 18px;
    font-weight: 600;
    color: #14b8a6;
  }
  .domain {
    position: absolute;
    bottom: 32px;
    right: 40px;
    font-size: 20px;
    color: #475569;
    font-weight: 600;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <span class="emoji">💎</span>
    <div class="headline">
      <span class="white">Local SEO</span><br>
      <span class="teal">on Steroids.</span>
    </div>
    <div class="sub">Rank #1 on Google Maps in 45 days — or we work for free</div>
    <div class="badges">
      <div class="badge">✓ No contracts</div>
      <div class="badge">✓ AI-native</div>
      <div class="badge">✓ One client per market</div>
    </div>
  </div>
  <div class="domain">diamondpages.ai</div>
</body>
</html>
